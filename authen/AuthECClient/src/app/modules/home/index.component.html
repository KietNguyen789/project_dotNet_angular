<div class="auth-wrapper">
  <div class="auth-card" style="max-width: 900px;">
    <h2>User List</h2>

    <div class="alert error" *ngIf="errorMsg">{{ errorMsg }}</div>

    <p *ngIf="loading">Loading...</p>

    <table *ngIf="!loading && users.length > 0" style="width:100%; border-collapse: collapse;">
      <thead>
        <tr>
          <th>#</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Username</th>
          <th>Gender</th>
          <th>Date of Birth</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ user.fullName }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.gender === 1 ? 'Male' : 'Female' }}</td>
          <td>{{ user.date_of_birth | date:'dd/MM/yyyy' }}</td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="!loading && users.length === 0 && !errorMsg">No users found.</p>
  </div>
</div>
